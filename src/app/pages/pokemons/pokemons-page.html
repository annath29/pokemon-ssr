<h1 class="text 3xl">Listado Pokemons</h1>
<h2 class="text-xl">Página actual: {{ currentPage() }}</h2>

<hr class="my-2" />

<!-- pokemon list -->
@if (pokemons()) {
  <app-pokemon-list [pokemons]="pokemons()" />
} @else {
  <pokemon-list-skeleton />
}
<!-- pokemon list skelenton -->
<!-- botones cargar siguientes y anteriores  -->
<div class="flex justify-between">
  <button class="mt-2" [disabled]="currentPage() === 1" [routerLink]="['/pokemons/page',currentPage()! - 1]">Anteriores</button>
  <button class="mt-2" [routerLink]="['/pokemons/page',currentPage()! +1 ]">Siguientes</button>
  <!-- <button class="mt-2" (click)="currentName.set('no se recarga')">{{currentName()}}</button> -->
</div>
